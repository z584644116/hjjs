# 简化的 ClawCloud Run 部署工作流
name: Simple Deploy to ClawCloud

on:
  push:
    branches: [ main, production ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Run checks
      run: |
        npm run lint
        npm run build

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      run: |
        docker build -t env-calculator:${{ github.sha }} .
        docker tag env-calculator:${{ github.sha }} env-calculator:latest

    - name: Save build info
      run: |
        printf '{\n  "image": "env-calculator:%s",\n  "commit": "%s",\n  "branch": "%s",\n  "workflow_run": "%s"\n}\n' \
          "${{ github.sha }}" \
          "${{ github.sha }}" \
          "${{ github.ref_name }}" \
          "${{ github.run_number }}" > build-info.json

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-info
        path: build-info.json

    - name: Deploy notification
      run: |
        echo "Deployment artifact is ready."
        echo "Built image: env-calculator:${{ github.sha }}" 

  notify-success:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: success()

    steps:
    - name: Success notification
      run: echo "Build completed successfully."

  notify-failure:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: failure()

    steps:
    - name: Failure notification
      run: |
        echo "Build failed."
        exit 1